# Sanitized snapshot of /etc/nginx/sites-available/chess.kevin-mok.com
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name chess.kevin-mok.com;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    proxy_pass http://127.0.0.1:3003;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 60s;
  }

  ssl_certificate /etc/letsencrypt/live/chess.kevin-mok.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/chess.kevin-mok.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
  listen 80;
  listen [::]:80;
  server_name chess.kevin-mok.com;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot/chess.kevin-mok.com;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}
