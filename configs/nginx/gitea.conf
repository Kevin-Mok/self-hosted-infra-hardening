# Sanitized snapshot of /etc/nginx/sites-available/gitea

server {
  server_name git.kevin-mok.com;

  location / {
    client_max_body_size 512M;
    proxy_pass http://127.0.0.1:3000;

    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Real-IP $remote_addr;

    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
  }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/git.kevin-mok.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/git.kevin-mok.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = git.kevin-mok.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


  listen 80;
  server_name git.kevin-mok.com;
    return 404; # managed by Certbot


}
